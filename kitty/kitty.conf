# font_family JetBrainsMono Nerd Font
font_size 12

shell /usr/bin/fish

background_opacity 0.1


# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

symbol_map U+E000-U+F8FF Symbols Nerd Font Mono
symbol_map U+F0000-U+FFFFD Symbols Nerd Font Mono
symbol_map U+100000-U+10FFFD Symbols Nerd Font Mono
